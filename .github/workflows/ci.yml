name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements-ci.txt') }}

      # Install PyTorch CPU
      - name: Install PyTorch
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      # Install minimal deps
      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      # Lint
      - name: Lint
        run: ruff check .

      # Type check (non-blocking)
      - name: Type check
        run: mypy configs/ models/ --ignore-missing-imports || true

      # Fast tests (NO heavy coverage here)
      - name: Run tests
        run: pytest tests/ -v -m "not slow" --maxfail=1 --disable-warnings
        timeout-minutes: 3

      # Optional coverage (non-blocking)
      - name: Coverage
        run: pytest tests/ --cov=. --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

      # ✅ FIXED: real scripts that exist
      - name: Smoke test CLIs
        run: |
          python tools/predict.py --help
          python tools/prepare_dataset.py --help